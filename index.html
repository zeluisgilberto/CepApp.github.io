<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FichasPro — Gestor de Torneo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #f0c040;
    --gold-dark: #c8960a;
    --gold-light: #ffe680;
    --dark: #0a0d12;
    --dark2: #111520;
    --dark3: #181e2e;
    --dark4: #1f2840;
    --accent: #2ef0a0;
    --accent2: #0af;
    --red: #ff4455;
    --text: #e8ecf5;
    --text-muted: #7a8baa;
    --border: rgba(240,192,64,0.18);
    --card-glow: 0 0 40px rgba(240,192,64,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    font-family:'Barlow',sans-serif;
    background:var(--dark);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
  }
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(240,192,64,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(46,240,160,0.04) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px);
    pointer-events:none;
    z-index:0;
  }

  /* ---- HEADER ---- */
  header {
    position:sticky; top:0; z-index:100;
    background:rgba(10,13,18,0.92);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    padding:0 32px;
    height:64px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo {
    font-family:'Bebas Neue',sans-serif;
    font-size:28px;
    letter-spacing:3px;
    background:linear-gradient(135deg, var(--gold) 30%, var(--gold-light));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .logo span { color:var(--accent); -webkit-text-fill-color:var(--accent); }
  nav { display:flex; gap:6px; }
  nav button {
    background:none; border:none; color:var(--text-muted);
    font-family:'Barlow Condensed',sans-serif;
    font-size:13px; font-weight:600; letter-spacing:1.5px;
    text-transform:uppercase; padding:8px 18px; border-radius:6px;
    cursor:pointer; transition:all .25s;
    position:relative;
  }
  nav button:hover { color:var(--gold); background:rgba(240,192,64,0.08); }
  nav button.active {
    color:var(--dark);
    background:var(--gold);
    font-weight:700;
  }

  /* ---- MAIN ---- */
  main { position:relative; z-index:1; padding:32px; max-width:1400px; margin:0 auto; }

  /* ---- VIEWS ---- */
  .view { display:none; animation:fadeUp .35s ease; }
  .view.active { display:block; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ---- PAGE HEADERS ---- */
  .page-header {
    display:flex; align-items:flex-end; justify-content:space-between;
    margin-bottom:32px; gap:16px; flex-wrap:wrap;
  }
  .page-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:48px; letter-spacing:2px;
    line-height:1;
    background:linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .page-subtitle { font-size:14px; color:var(--text-muted); margin-top:4px; letter-spacing:.5px; }

  /* ---- BTN ---- */
  .btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 24px; border-radius:8px; border:none;
    font-family:'Barlow Condensed',sans-serif;
    font-size:14px; font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase; cursor:pointer; transition:all .2s;
  }
  .btn-gold {
    background:linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    color:#000;
    box-shadow:0 4px 20px rgba(240,192,64,0.3);
  }
  .btn-gold:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(240,192,64,0.45); }
  .btn-outline {
    background:transparent; color:var(--text-muted);
    border:1.5px solid rgba(255,255,255,0.15);
  }
  .btn-outline:hover { border-color:var(--gold); color:var(--gold); background:rgba(240,192,64,0.06); }
  .btn-danger { background:rgba(255,68,85,0.15); color:var(--red); border:1.5px solid rgba(255,68,85,0.3); }
  .btn-danger:hover { background:rgba(255,68,85,0.25); }
  .btn-sm { padding:7px 14px; font-size:12px; }

  /* ---- STATS BAR ---- */
  .stats-bar {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:16px; margin-bottom:32px;
  }
  .stat-card {
    background:var(--dark3);
    border:1px solid var(--border);
    border-radius:12px; padding:20px;
    position:relative; overflow:hidden;
    transition:transform .2s;
  }
  .stat-card:hover { transform:translateY(-3px); }
  .stat-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg, var(--gold), var(--accent));
    border-radius:12px 12px 0 0;
  }
  .stat-num {
    font-family:'Bebas Neue',sans-serif;
    font-size:42px; color:var(--gold); line-height:1;
  }
  .stat-label { font-size:12px; color:var(--text-muted); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-top:4px; }

  /* ---- SEARCH / FILTER ---- */
  .filter-bar {
    display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px;
  }
  .search-box {
    flex:1; min-width:220px;
    background:var(--dark3); border:1.5px solid rgba(255,255,255,0.1);
    border-radius:8px; padding:11px 16px;
    color:var(--text); font-family:'Barlow',sans-serif; font-size:14px;
    transition:border-color .2s;
  }
  .search-box:focus { outline:none; border-color:var(--gold); }
  .search-box::placeholder { color:var(--text-muted); }
  select.filter-select {
    background:var(--dark3); border:1.5px solid rgba(255,255,255,0.1);
    border-radius:8px; padding:11px 16px;
    color:var(--text); font-family:'Barlow',sans-serif; font-size:14px;
    cursor:pointer; min-width:160px;
    transition:border-color .2s;
  }
  select.filter-select:focus { outline:none; border-color:var(--gold); }

  /* ---- PLAYERS GRID ---- */
  .players-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:24px;
  }

  /* ---- FIFA CARD ---- */
  .player-card {
    position:relative;
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .25s, box-shadow .25s;
    aspect-ratio: 3/4;
    min-height:300px;
  }
  .player-card:hover {
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(240,192,64,0.2);
  }
  .card-bg {
    position:absolute; inset:0;
    background:linear-gradient(160deg, #1a2040 0%, #0d1022 60%, #050810 100%);
  }
  .card-shine {
    position:absolute; inset:0;
    background:linear-gradient(130deg, rgba(240,192,64,0.18) 0%, transparent 40%, rgba(46,240,160,0.08) 100%);
    pointer-events:none;
  }
  .card-border {
    position:absolute; inset:2px;
    border-radius:14px;
    border:1.5px solid rgba(240,192,64,0.35);
    pointer-events:none;
  }
  .card-inner {
    position:relative; z-index:2;
    height:100%; display:flex; flex-direction:column;
    padding:16px 16px 14px;
  }
  .card-top {
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:8px;
  }
  .card-rating {
    font-family:'Bebas Neue',sans-serif;
    font-size:38px; line-height:1;
    color:var(--gold);
    text-shadow:0 0 20px rgba(240,192,64,0.5);
  }
  .card-pos-badge {
    font-family:'Bebas Neue',sans-serif;
    font-size:18px; letter-spacing:1px;
    padding:3px 10px;
    border-radius:6px;
    background:rgba(240,192,64,0.15);
    border:1px solid rgba(240,192,64,0.4);
    color:var(--gold);
  }
  .card-avatar {
    flex:1; display:flex; align-items:center; justify-content:center;
    margin:4px 0;
  }
  .card-avatar-img {
    width:90px; height:90px; border-radius:50%;
    object-fit:cover;
    border:2.5px solid rgba(240,192,64,0.5);
    box-shadow:0 0 20px rgba(240,192,64,0.2);
    background:var(--dark4);
    display:flex; align-items:center; justify-content:center;
    font-size:36px; color:var(--text-muted);
    font-family:'Bebas Neue',sans-serif;
    overflow:hidden;
  }
  .card-avatar-img img { width:100%; height:100%; object-fit:cover; }
  .card-avatar-initials {
    width:90px; height:90px; border-radius:50%;
    background:linear-gradient(135deg, var(--dark4), var(--dark3));
    border:2.5px solid rgba(240,192,64,0.4);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:28px;
    color:var(--gold); letter-spacing:2px;
  }
  .card-team-badge {
    width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700; letter-spacing:.5px;
    color:#fff; font-family:'Bebas Neue',sans-serif;
    border:1.5px solid rgba(255,255,255,0.2);
  }
  .card-divider {
    height:1px; background:linear-gradient(90deg, transparent, rgba(240,192,64,0.4), transparent);
    margin:8px 0;
  }
  .card-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:20px; letter-spacing:2px;
    color:#fff; text-align:center;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .card-team-name {
    font-size:11px; color:var(--text-muted); text-align:center;
    font-weight:600; letter-spacing:1px; text-transform:uppercase;
    margin-top:2px;
  }
  .card-stats {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:4px; margin-top:10px;
  }
  .card-stat {
    text-align:center;
  }
  .card-stat-val {
    font-family:'Bebas Neue',sans-serif;
    font-size:18px; color:var(--gold); line-height:1;
  }
  .card-stat-lbl {
    font-size:9px; color:var(--text-muted);
    font-weight:700; letter-spacing:.5px; text-transform:uppercase;
  }
  .card-value-tag {
    position:absolute; bottom:12px; right:12px;
    background:rgba(46,240,160,0.15);
    border:1px solid rgba(46,240,160,0.35);
    color:var(--accent);
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px; font-weight:700; letter-spacing:1px;
    padding:3px 10px; border-radius:20px;
  }
  .card-foot-badge {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    font-size:10px; font-weight:700; letter-spacing:1px;
    padding:2px 8px; border-radius:20px;
    background:rgba(255,255,255,0.08);
    color:var(--text-muted); border:1px solid rgba(255,255,255,0.12);
  }

  /* ---- MODAL ---- */
  .modal-overlay {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    animation:fadeIn .2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal-overlay.hidden { display:none; }
  .modal {
    background:var(--dark2);
    border:1px solid var(--border);
    border-radius:20px;
    width:100%; max-width:740px;
    max-height:90vh; overflow-y:auto;
    box-shadow:0 40px 100px rgba(0,0,0,0.8), var(--card-glow);
    animation:slideUp .3s ease;
    position:relative;
  }
  @keyframes slideUp {
    from{ transform:translateY(40px); opacity:0; }
    to  { transform:translateY(0);    opacity:1; }
  }
  .modal-header {
    padding:28px 32px 20px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:30px; letter-spacing:2px; color:var(--gold);
  }
  .modal-close {
    background:rgba(255,255,255,0.08); border:none;
    color:var(--text-muted); font-size:20px; width:36px; height:36px;
    border-radius:50%; cursor:pointer; transition:all .2s;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-close:hover { background:rgba(255,68,85,0.2); color:var(--red); }
  .modal-body { padding:28px 32px; }

  /* ---- FORMS ---- */
  .form-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:18px;
  }
  .form-group { display:flex; flex-direction:column; gap:7px; }
  .form-group.full { grid-column:1/-1; }
  label {
    font-size:11px; font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--text-muted);
  }
  input, select, textarea {
    background:var(--dark3); border:1.5px solid rgba(255,255,255,0.1);
    border-radius:8px; padding:11px 14px;
    color:var(--text); font-family:'Barlow',sans-serif; font-size:14px;
    transition:border-color .2s;
    width:100%;
  }
  input:focus, select:focus, textarea:focus {
    outline:none; border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(240,192,64,0.1);
  }
  textarea { resize:vertical; min-height:80px; }
  .form-actions {
    display:flex; gap:12px; justify-content:flex-end;
    margin-top:24px; padding-top:20px; border-top:1px solid var(--border);
  }
  .radio-group { display:flex; gap:12px; flex-wrap:wrap; }
  .radio-opt {
    display:flex; align-items:center; gap:8px;
    background:var(--dark3); border:1.5px solid rgba(255,255,255,0.1);
    border-radius:8px; padding:9px 16px; cursor:pointer;
    transition:all .2s; flex:1; justify-content:center;
  }
  .radio-opt:has(input:checked) {
    border-color:var(--gold); background:rgba(240,192,64,0.1);
    color:var(--gold);
  }
  .radio-opt input { display:none; }
  .radio-opt-label { font-weight:600; font-size:13px; }

  /* ---- PLAYER DETAIL MODAL ---- */
  .player-detail {
    display:grid; grid-template-columns:240px 1fr; gap:28px;
  }
  .player-detail-left { display:flex; flex-direction:column; gap:16px; }
  .detail-card-preview {
    width:100%; aspect-ratio:3/4;
    position:relative; border-radius:16px; overflow:hidden;
  }
  .detail-big-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:36px; letter-spacing:2px; color:var(--gold); line-height:1;
  }
  .detail-pos {
    font-family:'Barlow Condensed',sans-serif;
    font-size:18px; font-weight:700; letter-spacing:2px;
    color:var(--text-muted); text-transform:uppercase; margin-top:4px;
  }
  .detail-info-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px;
  }
  .detail-info-item {
    background:var(--dark3); border-radius:10px; padding:12px 16px;
    border:1px solid var(--border);
  }
  .detail-info-label { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); }
  .detail-info-value { font-size:16px; font-weight:600; color:var(--text); margin-top:3px; }
  .detail-value-big {
    font-family:'Bebas Neue',sans-serif;
    font-size:28px; color:var(--accent);
  }
  .history-list { margin-top:16px; }
  .history-item {
    display:flex; align-items:center; gap:12px;
    padding:10px 14px; background:var(--dark3); border-radius:8px;
    margin-bottom:8px; border-left:3px solid var(--gold);
  }
  .history-item-year { font-size:12px; color:var(--text-muted); font-weight:700; min-width:80px; }
  .history-item-team { font-weight:600; font-size:14px; }
  .history-item-note { font-size:12px; color:var(--text-muted); margin-left:auto; }

  /* ---- FIELD MAP ---- */
  .field-map {
    width:100%; max-width:340px; margin:0 auto;
    aspect-ratio: 2/3;
    background:linear-gradient(180deg, #1a3a1a 0%, #1e4a1e 100%);
    border-radius:12px; position:relative; overflow:hidden;
    border:2px solid rgba(255,255,255,0.1);
  }
  .field-lines {
    position:absolute; inset:0;
    background:
      /* Center circle */
      radial-gradient(circle 60px at 50% 50%, transparent 58px, rgba(255,255,255,0.25) 59px, transparent 60px),
      /* Half line */
      linear-gradient(transparent 49.5%, rgba(255,255,255,0.25) 49.5%, rgba(255,255,255,0.25) 50.5%, transparent 50.5%),
      /* Penalty areas */
      linear-gradient(transparent 12%, rgba(255,255,255,0.12) 12%, rgba(255,255,255,0.12) 13%, transparent 13%),
      linear-gradient(transparent 87%, rgba(255,255,255,0.12) 87%, rgba(255,255,255,0.12) 88%, transparent 88%);
    pointer-events:none;
  }
  .field-dot {
    position:absolute;
    transform:translate(-50%,-50%);
    cursor:pointer;
    transition:all .2s;
  }
  .field-dot-inner {
    width:36px; height:36px; border-radius:50%;
    background:rgba(240,192,64,0.85);
    border:2.5px solid #fff;
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:12px; color:#000;
    box-shadow:0 0 12px rgba(240,192,64,0.5);
    transition:transform .15s;
  }
  .field-dot:hover .field-dot-inner { transform:scale(1.2); }
  .field-dot-label {
    position:absolute; top:calc(100% + 4px); left:50%;
    transform:translateX(-50%);
    font-size:10px; font-weight:700; color:#fff;
    white-space:nowrap; text-shadow:0 1px 3px rgba(0,0,0,0.8);
    background:rgba(0,0,0,0.6); padding:2px 6px; border-radius:4px;
  }

  /* ---- TEAMS ---- */
  .teams-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
  }
  .team-card {
    background:var(--dark3); border-radius:16px;
    border:1px solid var(--border);
    padding:24px; position:relative; overflow:hidden;
    transition:transform .2s, box-shadow .2s;
    cursor:pointer;
  }
  .team-card:hover { transform:translateY(-4px); box-shadow:var(--card-glow); }
  .team-card-accent {
    position:absolute; top:0; left:0; right:0; height:4px;
  }
  .team-badge-big {
    width:64px; height:64px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:22px;
    color:#fff; font-weight:700; margin-bottom:16px;
    border:2px solid rgba(255,255,255,0.15);
    box-shadow:0 4px 16px rgba(0,0,0,0.4);
  }
  .team-name { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:1px; }
  .team-meta { font-size:12px; color:var(--text-muted); margin-top:4px; }
  .team-player-count {
    position:absolute; top:20px; right:20px;
    background:rgba(240,192,64,0.15); border:1px solid rgba(240,192,64,0.3);
    color:var(--gold); padding:4px 12px; border-radius:20px;
    font-size:12px; font-weight:700; font-family:'Barlow Condensed',sans-serif; letter-spacing:1px;
  }

  /* ---- TRANSFERS ---- */
  .transfer-table {
    background:var(--dark3); border-radius:16px;
    border:1px solid var(--border); overflow:hidden;
  }
  .transfer-table table { width:100%; border-collapse:collapse; }
  .transfer-table th {
    background:var(--dark4); padding:14px 20px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px; font-weight:700; letter-spacing:2px;
    text-transform:uppercase; color:var(--text-muted);
    text-align:left; border-bottom:1px solid var(--border);
  }
  .transfer-table td {
    padding:14px 20px; border-bottom:1px solid rgba(255,255,255,0.04);
    font-size:14px; vertical-align:middle;
  }
  .transfer-table tr:hover td { background:rgba(240,192,64,0.03); }
  .transfer-table tr:last-child td { border-bottom:none; }
  .transfer-amount {
    font-family:'Barlow Condensed',sans-serif;
    font-size:18px; font-weight:700; color:var(--accent);
  }
  .transfer-arrow {
    display:inline-flex; align-items:center; gap:8px;
    font-size:12px; color:var(--text-muted);
  }
  .transfer-arrow strong { color:var(--text); font-size:14px; }
  .badge {
    display:inline-block; padding:3px 10px; border-radius:20px;
    font-size:11px; font-weight:700; letter-spacing:.5px;
    font-family:'Barlow Condensed',sans-serif;
  }
  .badge-gold { background:rgba(240,192,64,0.15); color:var(--gold); border:1px solid rgba(240,192,64,0.3); }
  .badge-green { background:rgba(46,240,160,0.12); color:var(--accent); border:1px solid rgba(46,240,160,0.3); }
  .badge-red { background:rgba(255,68,85,0.12); color:var(--red); border:1px solid rgba(255,68,85,0.3); }

  /* ---- SCROLLBAR ---- */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--dark2); }
  ::-webkit-scrollbar-thumb { background:rgba(240,192,64,0.3); border-radius:3px; }

  /* ---- EMPTY STATE ---- */
  .empty-state {
    text-align:center; padding:60px 24px;
    color:var(--text-muted);
  }
  .empty-state-icon {
    font-size:64px; margin-bottom:16px; display:block;
    opacity:.3;
    font-family:'Bebas Neue',sans-serif; letter-spacing:4px; color:var(--gold);
  }
  .empty-state h3 { font-size:20px; color:var(--text); margin-bottom:8px; }
  .empty-state p { font-size:14px; }

  /* ---- RESPONSIVE ---- */
  @media(max-width:768px){
    main { padding:16px; }
    header { padding:0 16px; }
    .page-title { font-size:32px; }
    .player-detail { grid-template-columns:1fr; }
    .form-grid { grid-template-columns:1fr; }
    nav button { padding:8px 12px; font-size:11px; }
    .logo { font-size:22px; }
  }

  /* ---- TOAST ---- */
  .toast-container {
    position:fixed; bottom:24px; right:24px;
    z-index:999; display:flex; flex-direction:column; gap:8px;
  }
  .toast {
    background:var(--dark3); border:1px solid var(--border);
    border-radius:10px; padding:14px 20px;
    font-size:14px; color:var(--text);
    box-shadow:0 8px 30px rgba(0,0,0,0.5);
    animation:slideRight .3s ease;
    display:flex; align-items:center; gap:10px;
    min-width:260px;
  }
  .toast.success { border-color:rgba(46,240,160,0.4); }
  .toast.success .toast-dot { background:var(--accent); }
  .toast.error { border-color:rgba(255,68,85,0.4); }
  .toast.error .toast-dot { background:var(--red); }
  .toast-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  @keyframes slideRight {
    from { opacity:0; transform:translateX(30px); }
    to   { opacity:1; transform:translateX(0); }
  }

  /* ---- POSITIONS REFERENCE ---- */
  .pos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-top:16px; }
  .pos-chip {
    padding:8px 12px; border-radius:8px; text-align:center;
    background:var(--dark3); border:1px solid var(--border);
    font-size:12px; font-weight:700; letter-spacing:1px;
    cursor:pointer; transition:all .15s;
  }
  .pos-chip:hover, .pos-chip.active { background:rgba(240,192,64,0.15); border-color:var(--gold); color:var(--gold); }

  /* ---- DORSAL BADGE ---- */
  .dorsal-badge {
    display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:6px;
    background:linear-gradient(135deg, var(--dark4), var(--dark3));
    border:1.5px solid rgba(240,192,64,0.4);
    font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--gold);
  }
</style>
</head>
<body>

<header>
  <div class="logo">Fichas<span>PRO</span></div>
  <nav>
    <button class="active" onclick="showView('dashboard')">Dashboard</button>
    <button onclick="showView('players')">Jugadores</button>
    <button onclick="showView('teams')">Equipos</button>
    <button onclick="showView('transfers')">Pases</button>
  </nav>
</header>

<main>

  <!-- DASHBOARD -->
  <div id="view-dashboard" class="view active">
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-subtitle">Resumen del torneo</div>
      </div>
      <button class="btn btn-gold" onclick="openAddPlayer()">+ Nuevo Jugador</button>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:8px;">
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);margin-bottom:16px;">Ultimos Pases</div>
        <div id="recent-transfers-dash"></div>
      </div>
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);margin-bottom:16px;">Top Jugadores por Valor</div>
        <div id="top-players-dash"></div>
      </div>
    </div>
  </div>

  <!-- PLAYERS -->
  <div id="view-players" class="view">
    <div class="page-header">
      <div>
        <div class="page-title">Jugadores</div>
        <div class="page-subtitle">Fichas del torneo</div>
      </div>
      <button class="btn btn-gold" onclick="openAddPlayer()">+ Nueva Ficha</button>
    </div>
    <div class="filter-bar">
      <input class="search-box" type="text" placeholder="Buscar jugador..." id="search-player" oninput="renderPlayers()"/>
      <select class="filter-select" id="filter-team" onchange="renderPlayers()">
        <option value="">Todos los Equipos</option>
      </select>
      <select class="filter-select" id="filter-pos" onchange="renderPlayers()">
        <option value="">Todas las Posiciones</option>
        <option>POR</option><option>DFC</option><option>LI</option><option>LD</option>
        <option>MCD</option><option>MC</option><option>MCO</option>
        <option>EI</option><option>ED</option><option>DC</option><option>SD</option>
      </select>
      <select class="filter-select" id="filter-foot" onchange="renderPlayers()">
        <option value="">Ambos Pies</option>
        <option value="Diestro">Diestro</option>
        <option value="Zurdo">Zurdo</option>
      </select>
    </div>
    <div class="players-grid" id="players-grid"></div>
  </div>

  <!-- TEAMS -->
  <div id="view-teams" class="view">
    <div class="page-header">
      <div>
        <div class="page-title">Equipos</div>
        <div class="page-subtitle">Estructura del torneo</div>
      </div>
      <button class="btn btn-gold" onclick="openAddTeam()">+ Nuevo Equipo</button>
    </div>
    <div class="teams-grid" id="teams-grid"></div>
  </div>

  <!-- TRANSFERS -->
  <div id="view-transfers" class="view">
    <div class="page-header">
      <div>
        <div class="page-title">Libro de Pases</div>
        <div class="page-subtitle">Historial de transferencias</div>
      </div>
      <button class="btn btn-gold" onclick="openAddTransfer()">+ Registrar Pase</button>
    </div>
    <div class="transfer-table" id="transfers-table"></div>
  </div>

</main>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toast-container"></div>

<!-- MODAL: PLAYER FORM -->
<div class="modal-overlay hidden" id="modal-player-form">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-player-form-title">Nueva Ficha</div>
      <button class="modal-close" onclick="closeModal('modal-player-form')">x</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Nombre Completo</label><input type="text" id="f-name" placeholder="Ej: Juan Perez"/></div>
        <div class="form-group"><label>Dorsal / N. Camiseta</label><input type="number" id="f-dorsal" placeholder="10" min="1" max="99"/></div>
        <div class="form-group"><label>Equipo</label>
          <select id="f-team"><option value="">Sin equipo</option></select>
        </div>
        <div class="form-group"><label>Posicion Principal</label>
          <select id="f-pos">
            <option>POR</option><option>DFC</option><option>LI</option><option>LD</option>
            <option>MCD</option><option>MC</option><option>MCO</option>
            <option>EI</option><option>ED</option><option>DC</option><option>SD</option>
          </select>
        </div>
        <div class="form-group"><label>Curso / Categoria</label><input type="text" id="f-course" placeholder="Ej: 5to Basico, Sub-17..."/></div>
        <div class="form-group"><label>Edad</label><input type="number" id="f-age" placeholder="15" min="1" max="99"/></div>
        <div class="form-group full"><label>Pie Habil</label>
          <div class="radio-group">
            <label class="radio-opt"><input type="radio" name="foot" value="Diestro"/><span class="radio-opt-label">Diestro (Derecho)</span></label>
            <label class="radio-opt"><input type="radio" name="foot" value="Zurdo"/><span class="radio-opt-label">Zurdo (Izquierdo)</span></label>
            <label class="radio-opt"><input type="radio" name="foot" value="Ambidiestro"/><span class="radio-opt-label">Ambidiestro</span></label>
          </div>
        </div>
        <div class="form-group"><label>Velocidad (1-99)</label><input type="number" id="f-spd" placeholder="75" min="1" max="99"/></div>
        <div class="form-group"><label>Tiro (1-99)</label><input type="number" id="f-sht" placeholder="72" min="1" max="99"/></div>
        <div class="form-group"><label>Pase (1-99)</label><input type="number" id="f-pas" placeholder="70" min="1" max="99"/></div>
        <div class="form-group"><label>Defensa (1-99)</label><input type="number" id="f-def" placeholder="65" min="1" max="99"/></div>
        <div class="form-group"><label>Valor de Pase (S/. o $)</label><input type="number" id="f-value" placeholder="500" min="0"/></div>
        <div class="form-group"><label>URL Foto (opcional)</label><input type="text" id="f-photo" placeholder="https://..."/></div>
        <div class="form-group full"><label>Observaciones</label><textarea id="f-notes" placeholder="Notas adicionales sobre el jugador..."></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="closeModal('modal-player-form')">Cancelar</button>
        <button class="btn btn-gold" onclick="savePlayer()">Guardar Ficha</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: TEAM FORM -->
<div class="modal-overlay hidden" id="modal-team-form">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nuevo Equipo</div>
      <button class="modal-close" onclick="closeModal('modal-team-form')">x</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Nombre del Equipo</label><input type="text" id="t-name" placeholder="Los Invencibles"/></div>
        <div class="form-group"><label>Siglas (2-3 letras)</label><input type="text" id="t-abbr" placeholder="INV" maxlength="3"/></div>
        <div class="form-group"><label>Color del Equipo</label><input type="color" id="t-color" value="#f0c040"/></div>
        <div class="form-group"><label>Categoria / Division</label><input type="text" id="t-category" placeholder="Sub-17, Primera, etc."/></div>
        <div class="form-group full"><label>Descripcion</label><textarea id="t-desc" placeholder="Informacion del equipo..."></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="closeModal('modal-team-form')">Cancelar</button>
        <button class="btn btn-gold" onclick="saveTeam()">Guardar Equipo</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: TRANSFER FORM -->
<div class="modal-overlay hidden" id="modal-transfer-form">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Registrar Pase</div>
      <button class="modal-close" onclick="closeModal('modal-transfer-form')">x</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full"><label>Jugador</label>
          <select id="tr-player"><option value="">Seleccionar jugador...</option></select>
        </div>
        <div class="form-group"><label>Equipo de Origen</label>
          <select id="tr-from"><option value="">Libre / Sin equipo</option></select>
        </div>
        <div class="form-group"><label>Equipo de Destino</label>
          <select id="tr-to"><option value="">Sin equipo</option></select>
        </div>
        <div class="form-group"><label>Monto del Pase (referencial)</label>
          <input type="number" id="tr-amount" placeholder="0" min="0"/>
        </div>
        <div class="form-group"><label>Fecha</label>
          <input type="date" id="tr-date"/>
        </div>
        <div class="form-group"><label>Tipo de Pase</label>
          <select id="tr-type">
            <option value="Definitivo">Definitivo</option>
            <option value="Prestamo">Prestamo</option>
            <option value="Libre">Libre (Bosman)</option>
            <option value="Intercambio">Intercambio</option>
          </select>
        </div>
        <div class="form-group full"><label>Notas del Pase</label>
          <textarea id="tr-notes" placeholder="Condiciones del pase..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="closeModal('modal-transfer-form')">Cancelar</button>
        <button class="btn btn-gold" onclick="saveTransfer()">Confirmar Pase</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: PLAYER DETAIL -->
<div class="modal-overlay hidden" id="modal-player-detail">
  <div class="modal" style="max-width:860px;">
    <div class="modal-header">
      <div class="modal-title" id="detail-modal-title">Ficha del Jugador</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-outline btn-sm" id="detail-edit-btn">Editar</button>
        <button class="btn btn-danger btn-sm" id="detail-delete-btn">Eliminar</button>
        <button class="modal-close" onclick="closeModal('modal-player-detail')">x</button>
      </div>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<script>
// ============================================================
// DATA STORE
// ============================================================
let DB = {
  players: [],
  teams: [],
  transfers: []
};

function save() { localStorage.setItem('fichaspro_db', JSON.stringify(DB)); }
function load() {
  const raw = localStorage.getItem('fichaspro_db');
  if (raw) DB = JSON.parse(raw);
  else seedData();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function seedData() {
  DB.teams = [
    { id:'t1', name:'Aguila FC', abbr:'AGU', color:'#e63946', category:'Primera', desc:'Equipo favorito' },
    { id:'t2', name:'Los Buitres', abbr:'LBT', color:'#2196f3', category:'Primera', desc:'' },
    { id:'t3', name:'Estrella Dorada', abbr:'ESD', color:'#f0c040', category:'Sub-17', desc:'' }
  ];
  DB.players = [
    { id:'p1', name:'Carlos Medina', dorsal:10, team:'t1', pos:'DC', course:'5to Basico', age:16, foot:'Diestro', spd:82, sht:85, pas:78, def:42, value:1200, photo:'', notes:'Capitan del equipo' },
    { id:'p2', name:'Luis Torres', dorsal:1, team:'t1', pos:'POR', course:'4to Basico', age:15, foot:'Diestro', spd:55, sht:40, pas:62, def:80, value:600, photo:'', notes:'' },
    { id:'p3', name:'Miguel Fuentes', dorsal:5, team:'t2', pos:'DFC', course:'6to Basico', age:17, foot:'Zurdo', spd:70, sht:55, pas:65, def:82, value:800, photo:'', notes:'' },
    { id:'p4', name:'Andres Rios', dorsal:7, team:'t2', pos:'EI', course:'5to Basico', age:16, foot:'Zurdo', spd:88, sht:74, pas:72, def:38, value:900, photo:'', notes:'Extremo explosivo' },
    { id:'p5', name:'Pedro Salas', dorsal:8, team:'t3', pos:'MC', course:'3ro Basico', age:14, foot:'Diestro', spd:72, sht:68, pas:80, def:60, value:700, photo:'', notes:'' }
  ];
  DB.transfers = [
    { id:'tr1', player:'p4', from:'t3', to:'t2', amount:900, date:'2024-02-10', type:'Definitivo', notes:'Traspaso de temporada' },
    { id:'tr2', player:'p5', from:'', to:'t3', amount:0, type:'Libre', date:'2024-01-15', notes:'Jugador libre' }
  ];
  save();
}

// ============================================================
// NAVIGATION
// ============================================================
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => {
    if (b.textContent.toLowerCase().includes(v === 'dashboard' ? 'dash' : v.slice(0,4))) b.classList.add('active');
  });
  // Fix nav
  const map = {dashboard:0,players:1,teams:2,transfers:3};
  document.querySelectorAll('nav button')[map[v]].classList.add('active');
  renderAll();
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  renderStats();
  renderPlayers();
  renderTeams();
  renderTransfers();
  renderDashExtra();
  populateSelects();
}

// ============================================================
// STATS
// ============================================================
function renderStats() {
  const totalVal = DB.players.reduce((s,p) => s + (p.value||0), 0);
  const items = [
    { num: DB.players.length, label:'Jugadores' },
    { num: DB.teams.length, label:'Equipos' },
    { num: DB.transfers.length, label:'Pases' },
    { num: formatCurrency(totalVal), label:'Valor Total' }
  ];
  document.getElementById('stats-bar').innerHTML = items.map(i => `
    <div class="stat-card">
      <div class="stat-num">${i.num}</div>
      <div class="stat-label">${i.label}</div>
    </div>
  `).join('');
}

function formatCurrency(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'K';
  return '$' + n;
}

// ============================================================
// PLAYERS
// ============================================================
function renderPlayers() {
  const grid = document.getElementById('players-grid');
  const q = (document.getElementById('search-player')?.value||'').toLowerCase();
  const ft = document.getElementById('filter-team')?.value||'';
  const fp = document.getElementById('filter-pos')?.value||'';
  const ff = document.getElementById('filter-foot')?.value||'';

  let list = DB.players.filter(p => {
    if (q && !p.name.toLowerCase().includes(q)) return false;
    if (ft && p.team !== ft) return false;
    if (fp && p.pos !== fp) return false;
    if (ff && p.foot !== ff) return false;
    return true;
  });

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">FICHAS</div>
      <h3>Sin jugadores</h3>
      <p>Agrega el primer jugador con "+ Nueva Ficha"</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(p => playerCardHTML(p)).join('');
}

function playerCardHTML(p) {
  const team = DB.teams.find(t => t.id === p.team);
  const rating = Math.round(((p.spd||60)+(p.sht||60)+(p.pas||60)+(p.def||60))/4);
  const initials = p.name.split(' ').map(w=>w[0]||'').slice(0,2).join('');
  const teamColor = team ? team.color : '#888';
  const initBg = `background:${teamColor}22;border-color:${teamColor}66;`;

  return `
  <div class="player-card" onclick="openPlayerDetail('${p.id}')">
    <div class="card-bg"></div>
    <div class="card-shine"></div>
    <div class="card-border"></div>
    <div class="card-foot-badge">${p.foot||'?'}</div>
    <div class="card-inner">
      <div class="card-top">
        <div>
          <div class="card-rating">${rating}</div>
          <div class="card-pos-badge">${p.pos||'?'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
          ${team ? `<div class="card-team-badge" style="background:${teamColor}33;border-color:${teamColor}66;color:${teamColor}">${team.abbr}</div>` : ''}
          ${p.dorsal ? `<div class="dorsal-badge">${p.dorsal}</div>` : ''}
        </div>
      </div>
      <div class="card-avatar">
        ${p.photo
          ? `<div class="card-avatar-img"><img src="${p.photo}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div style=&quot;font-family:Bebas Neue,sans-serif;font-size:28px;color:var(--gold)&quot;>${initials}</div>'"/></div>`
          : `<div class="card-avatar-initials" style="${initBg}">${initials}</div>`
        }
      </div>
      <div class="card-divider"></div>
      <div class="card-name">${p.name}</div>
      <div class="card-team-name">${team ? team.name : 'Sin equipo'}</div>
      <div class="card-stats">
        <div class="card-stat"><div class="card-stat-val">${p.spd||'-'}</div><div class="card-stat-lbl">VEL</div></div>
        <div class="card-stat"><div class="card-stat-val">${p.sht||'-'}</div><div class="card-stat-lbl">TIR</div></div>
        <div class="card-stat"><div class="card-stat-val">${p.pas||'-'}</div><div class="card-stat-lbl">PAS</div></div>
      </div>
    </div>
    ${p.value ? `<div class="card-value-tag">${formatCurrency(p.value)}</div>` : ''}
  </div>`;
}

// ============================================================
// TEAMS
// ============================================================
function renderTeams() {
  const grid = document.getElementById('teams-grid');
  if (!grid) return;
  if (!DB.teams.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">EQUIPOS</div>
      <h3>Sin equipos</h3><p>Crea el primer equipo</p></div>`;
    return;
  }
  grid.innerHTML = DB.teams.map(t => {
    const count = DB.players.filter(p=>p.team===t.id).length;
    return `
    <div class="team-card" onclick="openTeamDetail('${t.id}')">
      <div class="team-card-accent" style="background:linear-gradient(90deg,${t.color},transparent)"></div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;">
        <div class="team-badge-big" style="background:${t.color}22;border-color:${t.color}66;color:${t.color}">${t.abbr||t.name[0]}</div>
        <div class="team-player-count">${count} jugadores</div>
      </div>
      <div class="team-name" style="color:${t.color}">${t.name}</div>
      <div class="team-meta">${t.category||'Sin categoria'}</div>
      ${t.desc ? `<div style="font-size:13px;color:var(--text-muted);margin-top:10px;">${t.desc}</div>` : ''}
      <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();editTeam('${t.id}')">Editar</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteTeam('${t.id}')">Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// TRANSFERS
// ============================================================
function renderTransfers() {
  const wrap = document.getElementById('transfers-table');
  if (!wrap) return;
  if (!DB.transfers.length) {
    wrap.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">PASES</div>
      <h3>Sin transferencias</h3><p>Registra el primer pase</p></div>`;
    return;
  }
  const rows = [...DB.transfers].reverse().map(tr => {
    const player = DB.players.find(p=>p.id===tr.player);
    const fromTeam = DB.teams.find(t=>t.id===tr.from);
    const toTeam = DB.teams.find(t=>t.id===tr.to);
    const typeClass = {Definitivo:'badge-gold',Prestamo:'badge-green',Libre:'badge-red',Intercambio:'badge-gold'}[tr.type]||'badge-gold';
    return `<tr>
      <td><strong>${player ? player.name : 'Jugador eliminado'}</strong>${player?`<br><span style="font-size:12px;color:var(--text-muted)">${player.pos||''} | ${player.course||''}</span>`:''}</td>
      <td><div class="transfer-arrow">
        <strong>${fromTeam ? fromTeam.name : 'Libre'}</strong>
        <span style="color:var(--gold)">--&gt;</span>
        <strong>${toTeam ? toTeam.name : 'Sin equipo'}</strong>
      </div></td>
      <td><div class="transfer-amount">${tr.amount > 0 ? formatCurrency(tr.amount) : 'Libre'}</div></td>
      <td><span class="badge ${typeClass}">${tr.type}</span></td>
      <td style="color:var(--text-muted);font-size:13px;">${tr.date||'-'}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteTransfer('${tr.id}')">Eliminar</button></td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table>
    <thead><tr>
      <th>Jugador</th><th>Movimiento</th><th>Monto</th><th>Tipo</th><th>Fecha</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ============================================================
// DASHBOARD EXTRA
// ============================================================
function renderDashExtra() {
  // Recent transfers
  const rDiv = document.getElementById('recent-transfers-dash');
  if (rDiv) {
    const recent = [...DB.transfers].slice(-4).reverse();
    if (!recent.length) { rDiv.innerHTML = '<p style="color:var(--text-muted);font-size:14px;">Sin pases registrados.</p>'; }
    else {
      rDiv.innerHTML = recent.map(tr => {
        const p = DB.players.find(x=>x.id===tr.player);
        const to = DB.teams.find(x=>x.id===tr.to);
        return `<div class="history-item">
          <div style="display:flex;flex-direction:column;gap:2px;">
            <span style="font-weight:700;font-size:14px;">${p?p.name:'?'}</span>
            <span style="font-size:12px;color:var(--text-muted)">-&gt; ${to?to.name:'Libre'}</span>
          </div>
          <span class="history-item-note" style="color:var(--accent);font-weight:700;">${tr.amount>0?formatCurrency(tr.amount):'Libre'}</span>
        </div>`;
      }).join('');
    }
  }
  // Top players
  const tDiv = document.getElementById('top-players-dash');
  if (tDiv) {
    const top = [...DB.players].sort((a,b)=>(b.value||0)-(a.value||0)).slice(0,5);
    if (!top.length) { tDiv.innerHTML = '<p style="color:var(--text-muted);font-size:14px;">Sin jugadores registrados.</p>'; }
    else {
      tDiv.innerHTML = top.map((p,i) => {
        const team = DB.teams.find(t=>t.id===p.team);
        return `<div class="history-item" style="cursor:pointer" onclick="openPlayerDetail('${p.id}')">
          <span style="font-family:Bebas Neue,sans-serif;font-size:22px;color:var(--gold);min-width:28px;">${i+1}</span>
          <div style="display:flex;flex-direction:column;gap:2px;flex:1;">
            <span style="font-weight:700;font-size:14px;">${p.name}</span>
            <span style="font-size:12px;color:var(--text-muted)">${p.pos||'?'} | ${team?team.name:'Libre'}</span>
          </div>
          <span style="color:var(--accent);font-weight:700;font-family:Barlow Condensed,sans-serif;font-size:16px;">${formatCurrency(p.value||0)}</span>
        </div>`;
      }).join('');
    }
  }
}

// ============================================================
// POPULATE SELECTS
// ============================================================
function populateSelects() {
  const teamOpts = DB.teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
  const playerOpts = DB.players.map(p => `<option value="${p.id}">${p.name} (${p.pos||'?'})</option>`).join('');

  const fTeam = document.getElementById('f-team');
  if (fTeam) fTeam.innerHTML = `<option value="">Sin equipo</option>` + teamOpts;

  const filterTeam = document.getElementById('filter-team');
  if (filterTeam) filterTeam.innerHTML = `<option value="">Todos los Equipos</option>` + teamOpts;

  const trPlayer = document.getElementById('tr-player');
  if (trPlayer) trPlayer.innerHTML = `<option value="">Seleccionar jugador...</option>` + playerOpts;

  ['tr-from','tr-to'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = `<option value="">Sin equipo / Libre</option>` + teamOpts;
  });
}

// ============================================================
// PLAYER FORM
// ============================================================
let editingPlayerId = null;
function openAddPlayer() {
  editingPlayerId = null;
  document.getElementById('modal-player-form-title').textContent = 'Nueva Ficha';
  ['f-name','f-dorsal','f-course','f-age','f-spd','f-sht','f-pas','f-def','f-value','f-photo','f-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.querySelectorAll('input[name=foot]').forEach(r => r.checked = false);
  document.getElementById('f-pos').value = 'DC';
  populateSelects();
  openModal('modal-player-form');
}

function openEditPlayer(id) {
  const p = DB.players.find(x=>x.id===id);
  if (!p) return;
  editingPlayerId = id;
  document.getElementById('modal-player-form-title').textContent = 'Editar Ficha';
  document.getElementById('f-name').value = p.name||'';
  document.getElementById('f-dorsal').value = p.dorsal||'';
  document.getElementById('f-course').value = p.course||'';
  document.getElementById('f-age').value = p.age||'';
  document.getElementById('f-spd').value = p.spd||'';
  document.getElementById('f-sht').value = p.sht||'';
  document.getElementById('f-pas').value = p.pas||'';
  document.getElementById('f-def').value = p.def||'';
  document.getElementById('f-value').value = p.value||'';
  document.getElementById('f-photo').value = p.photo||'';
  document.getElementById('f-notes').value = p.notes||'';
  document.getElementById('f-pos').value = p.pos||'DC';
  document.querySelectorAll('input[name=foot]').forEach(r => { r.checked = r.value === p.foot; });
  populateSelects();
  document.getElementById('f-team').value = p.team||'';
  closeModal('modal-player-detail');
  openModal('modal-player-form');
}

function savePlayer() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Ingresa el nombre del jugador','error'); return; }
  const foot = document.querySelector('input[name=foot]:checked')?.value || 'Diestro';
  const data = {
    name, foot,
    dorsal: parseInt(document.getElementById('f-dorsal').value)||null,
    team: document.getElementById('f-team').value||'',
    pos: document.getElementById('f-pos').value,
    course: document.getElementById('f-course').value.trim(),
    age: parseInt(document.getElementById('f-age').value)||null,
    spd: Math.min(99,Math.max(1,parseInt(document.getElementById('f-spd').value)||60)),
    sht: Math.min(99,Math.max(1,parseInt(document.getElementById('f-sht').value)||60)),
    pas: Math.min(99,Math.max(1,parseInt(document.getElementById('f-pas').value)||60)),
    def: Math.min(99,Math.max(1,parseInt(document.getElementById('f-def').value)||60)),
    value: parseInt(document.getElementById('f-value').value)||0,
    photo: document.getElementById('f-photo').value.trim(),
    notes: document.getElementById('f-notes').value.trim()
  };
  if (editingPlayerId) {
    const idx = DB.players.findIndex(p=>p.id===editingPlayerId);
    DB.players[idx] = { ...DB.players[idx], ...data };
    toast('Ficha actualizada','success');
  } else {
    DB.players.push({ id: uid(), ...data });
    toast('Jugador agregado','success');
  }
  save(); closeModal('modal-player-form'); renderAll();
}

// ============================================================
// PLAYER DETAIL
// ============================================================
function openPlayerDetail(id) {
  const p = DB.players.find(x=>x.id===id);
  if (!p) return;
  const team = DB.teams.find(t=>t.id===p.team);
  const rating = Math.round(((p.spd||60)+(p.sht||60)+(p.pas||60)+(p.def||60))/4);
  const history = DB.transfers.filter(tr=>tr.player===id);
  const initials = p.name.split(' ').map(w=>w[0]||'').slice(0,2).join('');
  const teamColor = team ? team.color : '#888';

  const posMap = {
    POR:{top:'82%',left:'50%'}, DFC:{top:'70%',left:'50%'},
    LI:{top:'65%',left:'20%'}, LD:{top:'65%',left:'80%'},
    MCD:{top:'50%',left:'50%'}, MC:{top:'42%',left:'50%'}, MCO:{top:'35%',left:'50%'},
    EI:{top:'28%',left:'20%'}, ED:{top:'28%',left:'80%'},
    DC:{top:'18%',left:'50%'}, SD:{top:'20%',left:'50%'}
  };
  const posCoords = posMap[p.pos] || {top:'50%',left:'50%'};

  document.getElementById('detail-modal-title').textContent = p.name.toUpperCase();
  document.getElementById('detail-edit-btn').onclick = () => openEditPlayer(id);
  document.getElementById('detail-delete-btn').onclick = () => {
    if (confirm('Eliminar a ' + p.name + '?')) {
      DB.players = DB.players.filter(x=>x.id!==id);
      DB.transfers = DB.transfers.filter(x=>x.player!==id);
      save(); closeModal('modal-player-detail'); renderAll();
      toast('Jugador eliminado','error');
    }
  };

  document.getElementById('detail-body').innerHTML = `
    <div class="player-detail">
      <div class="player-detail-left">
        <div class="detail-card-preview">
          ${playerCardHTML(p).replace('onclick="openPlayerDetail(\''+id+'\')"','style="pointer-events:none"')}
        </div>
      </div>
      <div>
        <div class="detail-big-name">${p.name}</div>
        <div class="detail-pos">${p.pos||''} ${team?'| '+team.name:''}</div>
        <div class="detail-info-grid">
          <div class="detail-info-item">
            <div class="detail-info-label">Dorsal</div>
            <div class="detail-info-value" style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold)">#${p.dorsal||'?'}</div>
          </div>
          <div class="detail-info-item">
            <div class="detail-info-label">Pie Habil</div>
            <div class="detail-info-value">${p.foot||'?'}</div>
          </div>
          <div class="detail-info-item">
            <div class="detail-info-label">Edad</div>
            <div class="detail-info-value">${p.age||'?'} anos</div>
          </div>
          <div class="detail-info-item">
            <div class="detail-info-label">Curso / Categoria</div>
            <div class="detail-info-value">${p.course||'Sin asignar'}</div>
          </div>
          <div class="detail-info-item">
            <div class="detail-info-label">Rating General</div>
            <div class="detail-value-big">${rating}</div>
          </div>
          <div class="detail-info-item">
            <div class="detail-info-label">Valor de Pase</div>
            <div class="detail-value-big" style="color:var(--accent)">${formatCurrency(p.value||0)}</div>
          </div>
        </div>
        <!-- FIELD MAP -->
        <div style="margin-top:20px;">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);margin-bottom:10px;">Posicion en el Campo</div>
          <div class="field-map" style="max-width:220px;">
            <div class="field-lines"></div>
            <div class="field-dot" style="top:${posCoords.top};left:${posCoords.left}">
              <div class="field-dot-inner" style="background:${teamColor}">${p.pos||'?'}</div>
              <div class="field-dot-label">${p.name.split(' ')[0]}</div>
            </div>
          </div>
        </div>
        <!-- HISTORY -->
        <div style="margin-top:20px;">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);margin-bottom:10px;">Historial de Pases</div>
          ${history.length ? history.map(tr => {
            const ft = DB.teams.find(x=>x.id===tr.from);
            const tt = DB.teams.find(x=>x.id===tr.to);
            return `<div class="history-item">
              <div class="history-item-year">${tr.date||'?'}</div>
              <div class="history-item-team">${ft?ft.name:'Libre'} &rarr; ${tt?tt.name:'?'}</div>
              <div class="history-item-note">${tr.amount>0?formatCurrency(tr.amount):'Libre'} | ${tr.type}</div>
            </div>`;
          }).join('') : '<p style="font-size:13px;color:var(--text-muted);">Sin historial de pases.</p>'}
        </div>
        ${p.notes ? `<div style="margin-top:16px;padding:14px;background:var(--dark3);border-radius:10px;border:1px solid var(--border);font-size:14px;color:var(--text-muted);">${p.notes}</div>` : ''}
      </div>
    </div>`;
  openModal('modal-player-detail');
}

// ============================================================
// TEAMS
// ============================================================
let editingTeamId = null;
function openAddTeam() {
  editingTeamId = null;
  ['t-name','t-abbr','t-category','t-desc'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });
  document.getElementById('t-color').value = '#f0c040';
  openModal('modal-team-form');
}
function editTeam(id) {
  const t = DB.teams.find(x=>x.id===id);
  if (!t) return;
  editingTeamId = id;
  document.getElementById('t-name').value = t.name||'';
  document.getElementById('t-abbr').value = t.abbr||'';
  document.getElementById('t-color').value = t.color||'#f0c040';
  document.getElementById('t-category').value = t.category||'';
  document.getElementById('t-desc').value = t.desc||'';
  openModal('modal-team-form');
}
function saveTeam() {
  const name = document.getElementById('t-name').value.trim();
  if (!name) { toast('Ingresa el nombre del equipo','error'); return; }
  const data = {
    name,
    abbr: document.getElementById('t-abbr').value.trim().toUpperCase().slice(0,3) || name.slice(0,3).toUpperCase(),
    color: document.getElementById('t-color').value,
    category: document.getElementById('t-category').value.trim(),
    desc: document.getElementById('t-desc').value.trim()
  };
  if (editingTeamId) {
    const idx = DB.teams.findIndex(t=>t.id===editingTeamId);
    DB.teams[idx] = { ...DB.teams[idx], ...data };
    toast('Equipo actualizado','success');
  } else {
    DB.teams.push({ id: uid(), ...data });
    toast('Equipo creado','success');
  }
  save(); closeModal('modal-team-form'); renderAll();
}
function deleteTeam(id) {
  const t = DB.teams.find(x=>x.id===id);
  if (!t) return;
  if (!confirm('Eliminar equipo ' + t.name + '? Los jugadores quedaran sin equipo.')) return;
  DB.players.forEach(p => { if(p.team===id) p.team=''; });
  DB.teams = DB.teams.filter(x=>x.id!==id);
  save(); renderAll(); toast('Equipo eliminado','error');
}
function openTeamDetail(id) { editTeam(id); }

// ============================================================
// TRANSFERS
// ============================================================
function openAddTransfer() {
  ['tr-player','tr-from','tr-to','tr-amount','tr-notes'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });
  document.getElementById('tr-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('tr-type').value = 'Definitivo';
  populateSelects();
  openModal('modal-transfer-form');
}

document.addEventListener('change', function(e) {
  if (e.target.id === 'tr-player') {
    const p = DB.players.find(x=>x.id===e.target.value);
    if (p) {
      document.getElementById('tr-from').value = p.team||'';
      if (p.value) document.getElementById('tr-amount').value = p.value;
    }
  }
});

function saveTransfer() {
  const player = document.getElementById('tr-player').value;
  if (!player) { toast('Selecciona un jugador','error'); return; }
  const to = document.getElementById('tr-to').value;
  const data = {
    id: uid(), player,
    from: document.getElementById('tr-from').value||'',
    to: to||'',
    amount: parseInt(document.getElementById('tr-amount').value)||0,
    date: document.getElementById('tr-date').value,
    type: document.getElementById('tr-type').value,
    notes: document.getElementById('tr-notes').value.trim()
  };
  // Update player's team
  const pIdx = DB.players.findIndex(p=>p.id===player);
  if (pIdx >= 0) DB.players[pIdx].team = to;
  DB.transfers.push(data);
  save(); closeModal('modal-transfer-form'); renderAll();
  toast('Pase registrado exitosamente','success');
}

function deleteTransfer(id) {
  if (!confirm('Eliminar este pase del historial?')) return;
  DB.transfers = DB.transfers.filter(x=>x.id!==id);
  save(); renderTransfers(); toast('Pase eliminado','error');
}

// ============================================================
// MODAL HELPERS
// ============================================================
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.add('hidden');
  }
});

// ============================================================
// TOAST
// ============================================================
function toast(msg, type='success') {
  const wrap = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<div class="toast-dot"></div><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ============================================================
// INIT
// ============================================================
load();
renderAll();
// Fix nav active state on load
document.querySelectorAll('nav button')[0].classList.add('active');
</script>
</body>
